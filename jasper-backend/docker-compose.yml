version: "3.8"

networks:
  jasper-net:
    driver: bridge

services:
  jasper-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jasper-backend
    ports:
      - "8000:8000"
    env_file:
      - .env.local
    networks:
      - jasper-net

  jasper-ml:
    build:
      context: ../jasper-ml
      dockerfile: Dockerfile
    container_name: jasper-ml
    ports:
      - "8001:8001"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - ALLOWED_ORIGINS=http://localhost:3000,https://*.vercel.app
    networks:
      - jasper-net

  kong:
    image: kong:3.6
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_URL: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:9001"
    volumes:
      - ./kong/kong.yml:/kong/kong.yml
    ports:
      - "8080:8000"
      - "9001:9001"
    depends_on:
      - jasper-backend
      - jasper-ml
    networks:
      - jasper-net
