global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "project-jasper-supabase"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "supabase-db:5432"

  - job_name: "project-jasper-convex"
    metrics_path: "/metrics"
    static_configs:
      - targets:
          - "convex-functions:3210"
