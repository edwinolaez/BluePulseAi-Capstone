name: Deploy — Staging

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [develop]
  workflow_dispatch:

jobs:
  deploy-staging:
    name: "Auto-deploy to Vercel Staging"
    runs-on: ubuntu-latest
    # Deploy when CI passed, or when triggered manually via workflow_dispatch
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Vercel CLI
        run: npm install -g vercel

      # Run vercel pull from REPO ROOT so Vercel can resolve its own rootDirectory
      # setting ("jasper-frontend") and change into it correctly during vercel build.
      # Running from the subdirectory causes double-nesting and produces 4.8KB dummy output.
      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Install dependencies
        working-directory: jasper-frontend
        run: npm install

      # Hard-failing step: surfaces the real next build error before Vercel wraps it.
      - name: Build Next.js (fail fast — shows real errors)
        working-directory: jasper-frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.RAILWAY_API_URL }}
          NEXT_PUBLIC_ML_API_BASE_URL: ${{ secrets.ML_API_URL }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      # Run vercel build from REPO ROOT — Vercel changes into jasper-frontend/ itself.
      # Output lands at <repo-root>/.vercel/output/ which vercel deploy --prebuilt expects.
      - name: Package for Vercel (Build Output API format)
        timeout-minutes: 15
        run: vercel build --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          NEXT_PUBLIC_API_BASE_URL: ${{ secrets.RAILWAY_API_URL }}
          NEXT_PUBLIC_ML_API_BASE_URL: ${{ secrets.ML_API_URL }}
          NEXT_PUBLIC_CONVEX_URL: ${{ secrets.NEXT_PUBLIC_CONVEX_URL }}
          NEXT_PUBLIC_API_KEY: ${{ secrets.NEXT_PUBLIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Verify build output
        run: |
          echo "=== .vercel/output size ==="
          du -sh .vercel/output/ 2>/dev/null || { echo "ERROR: .vercel/output does not exist"; exit 1; }
          echo "=== .vercel/output top-level ==="
          ls -la .vercel/output/
          echo "=== functions ==="
          ls -la .vercel/output/functions/ 2>/dev/null || echo "(no functions dir)"
          SIZE=$(du -sk .vercel/output/ 2>/dev/null | cut -f1)
          echo "Total output: ${SIZE}KB"
          if [ "$SIZE" -lt 500 ]; then
            echo "ERROR: Build output is only ${SIZE}KB — packaging failed. Aborting deploy."
            exit 1
          fi

      - name: Deploy prebuilt output to Vercel (staging)
        timeout-minutes: 10
        run: vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy backend to Railway (staging)
        run: |
          echo "Railway deployment triggered via push to develop"
          echo "Railway auto-deploys from this branch via webhook — no CLI step needed here"
          echo "Staging backend URL: ${{ secrets.RAILWAY_STAGING_URL }}"

      - name: Smoke test staging
        run: |
          STAGING_URL="${{ secrets.RAILWAY_STAGING_URL }}"
          if [ -n "$STAGING_URL" ]; then
            curl --fail --retry 3 --retry-delay 5 "$STAGING_URL/health" \
              && echo "Staging backend health check passed" \
              || echo "WARNING: Staging health check failed — investigate before M4 sign-off"
          else
            echo "RAILWAY_STAGING_URL not set yet — skipping smoke test"
          fi
