version: 2
updates:
  # ─── npm (frontend) ─────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/jasper-frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    reviewers:
      - "edwinolaez"
    commit-message:
      prefix: "chore"
      include: "scope"

  # ─── pip (backend) ──────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/jasper-backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    reviewers:
      - "edwinolaez"
    commit-message:
      prefix: "chore"
      include: "scope"

  # ─── pip (ML) ───────────────────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/jasper-ml"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "08:00"
      timezone: "America/Edmonton"
    open-pull-requests-limit: 5
    labels:
      - "security"
      - "dependencies"
    reviewers:
      - "edwinolaez"
    commit-message:
      prefix: "chore"
      include: "scope"

  # ─── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "ci"
      - "dependencies"
    reviewers:
      - "edwinolaez"
    commit-message:
      prefix: "ci"
